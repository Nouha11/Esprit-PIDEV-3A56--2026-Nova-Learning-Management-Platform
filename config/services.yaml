parameters:
    admin_notification_email: 'oussamastudy2@gmail.com'
    openai_api_key: '%env(OPENAI_API_KEY)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\Service\QuizReportNotificationService:
        arguments:
            $adminEmail: '%admin_notification_email%'

    App\Service\StudySession\AIRecommendationService:
        arguments:
            $openaiApiKey: '%env(OPENAI_API_KEY)%'

    App\Service\StudySession\ResourceManager:
        arguments:
            $uploadDirectory: '%env(UPLOAD_DIRECTORY)%'

    App\Service\StudySession\YouTubeApiClient:
        arguments:
            $youtubeApiKey: '%env(YOUTUBE_API_KEY)%'

when@test:
    services:
        _defaults:
            autowire: true
            autoconfigure: true
