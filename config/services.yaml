parameters:
    admin_notification_email: 'oussamastudy2@gmail.com'
    from_email: 'oussamastudy2@gmail.com'
    openai_api_key: '%env(OPENAI_API_KEY)%'
    gemini_api_key: '%env(GEMINI_API_KEY)%'
    youtube_api_key: '%env(YOUTUBE_API_KEY)%'
    hugging_face_api_key: '%env(HUGGING_FACE_API_KEY)%'
    upload_directory: '%kernel.project_dir%/public/%env(UPLOAD_DIRECTORY)%'

services:
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.
        bind:
            $uploadDirectory: '%upload_directory%'
            $youtubeApiKey: '%youtube_api_key%'
            $openaiApiKey: '%openai_api_key%'
            $geminiApiKey: '%gemini_api_key%'
            $huggingFaceApiKey: '%hugging_face_api_key%'
            $fromEmail: '%from_email%'

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    # File Upload Service Configuration
    App\Service\Library\FileUploadService:
        arguments:
            $uploadsDirectory: '%kernel.project_dir%/public/uploads'

    # AI Assistant Service Configuration
    App\Service\Library\AiAssistantService:
        arguments:
            $aiApiKey: '%env(AI_API_KEY)%'
            $aiProvider: '%env(AI_PROVIDER)%'

    App\Service\Quiz\QuizReportNotificationService:
        arguments:
            $adminEmail: '%admin_notification_email%'

    App\Service\StudySession\AIRecommendationService:
        arguments:
            $openaiApiKey: '%env(OPENAI_API_KEY)%'

    App\Service\StudySession\ResourceManager:
        arguments:
            $uploadDirectory: '%env(UPLOAD_DIRECTORY)%'

    App\Service\StudySession\YouTubeApiClient:
        arguments:
            $youtubeApiKey: '%env(YOUTUBE_API_KEY)%'

    App\Service\game\HuggingFaceService:
        arguments:
            $huggingFaceApiKey: '%env(HUGGING_FACE_API_KEY)%'

    App\Service\Quiz\QuizHintService:
        arguments:
            $geminiApiKey: '%env(GEMINI_API_KEY)%'

when@test:
    services:
        _defaults:
            autowire: true
            autoconfigure: true